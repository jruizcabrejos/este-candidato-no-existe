name: Deploy

on:
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show commit
        run: echo "Deploying commit ${GITHUB_SHA}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        env:
          VITE_GA_ID: ${{ secrets.GA_ID }}
        run: npm run build

      - name: Validate FTP destination
        env:
          FTP_DESTINATION: ${{ secrets.FTP_DESTINATION }}
        run: |
          set -euo pipefail

          if [[ -z "${FTP_DESTINATION}" ]]; then
            echo "::error title=Missing FTP_DESTINATION::Set FTP_DESTINATION to the remote server directory that maps to /candidatos/."
            exit 1
          fi

          if [[ "${FTP_DESTINATION}" == http://* || "${FTP_DESTINATION}" == https://* || "${FTP_DESTINATION}" == *"://"* ]]; then
            echo "::error title=Invalid FTP_DESTINATION::FTP_DESTINATION must be a server path such as /public_html/candidatos/, not a website URL."
            exit 1
          fi

          if [[ "${FTP_DESTINATION}" != */ ]]; then
            echo "::warning title=FTP_DESTINATION missing trailing slash::A trailing slash is recommended, for example /public_html/candidatos/."
          fi

      - name: Upload via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: dist/
          server-dir: ${{ secrets.FTP_DESTINATION }}
          security: loose
          dangerous-clean-slate: false
